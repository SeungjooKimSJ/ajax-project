<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJAX Project</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
</head>

<body>
  <header>
    <div class="home-page-view" data-view="home-page">
      <h2 class="header-h2">Bucket Places</h2>
      <div class="header-search-icon">
        <i class="fas fa-search"></i>
      </div>
    </div>

    <div class="search-page-view hidden" data-view="home-page">
      <form class="search-bar">
        <label for="search">
          <input type="search" name="search" id="input-search" placeholder="search bucket places">
          <button class="search-icon-btn">
            <i class="fas fa-search fa-search-inside"></i>
          </button>
        </label>
      </form>
    </div>
  </header>

  <main>
    <div class="main-h2-and-img-view" data-view="home-page">
      <div class="greeting">
        <h2 class="greeting-h2">Welcome, SJ !</h2>
      </div>
      <div class="main-image">
        <img src="images/new-year-winter-ver.jpg" alt="2021 with santa hat" class="main-img">
      </div>
    </div>

    <div class="search-h2-and-img-view hidden" data-view="home-page">
      <h2 class="greeting-search-h2">
        Where are your places
      </h2>
      <img src="./images/Travel-the-world.jpg.jpg" alt="Travel The World" class="search-img-1">
      <img src="./images/Explore-the-world.jpg.jpg" alt="Explore The World" class="search-img-2">
    </div>

    <div class="main-two-btns-view" data-view="home-page">
      <div class="main-first-btn">
        <button>
          <div class="main-btn-search-icon">
            <i class="fas fa-search"></i>
          </div>
          Search Bucket Places
        </button>
      </div>
      <div class="main-second-btn">
        <button>To My Places</button>
      </div>
    </div>

    <!-- <div class="my-place-view hidden" data-view="home-page">
      <h2 class="my-place-h2">My Places</h2>
    </div>
    <ul class="ul-view hidden" data-view="home-page">
      <li class="my-place-listed"></li>
    </ul> -->

    <div class="search-result-view hidden" data-view="home-page">
      <h2 class="search-result-h2"></h2>
    </div>
    <ul class="search-ul-view hidden" data-view="home-page">
      <li class="search-result-listed"></li>
    </ul>

    <div class="modal-content hidden">
      <form class="modal-form">
        <div class="modal-h2-and-btn">
          <h2 class="add-to-my-places">
            Add to My Places
          </h2>
          <button type="button" class="no-btn">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-labels">
          <label for="name" class="modal-name">Name</label>
          <input required type="text" name="name" class="picture-name">
          <label for="description" class="modal-description">Description</label>
          <textarea required type="text" name="description"
          class="picture-description" rows="5"></textarea>
        </div>

        <div class="form-save">
          <button type="submit" class="add-this-place-btn">
            Add this place
          </button>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-home-icons-view" data-view="home-page">
      <i class="fas fa-home"></i>
      <i class="fas fa-plus"></i>
      <i class="fas fa-map-marked-alt"></i>
    </div>

    <div class="footer-search-icons-view hidden" data-view="home-page">
      <i class="fas fa-home"></i>
      <i class="fas fa-plus"></i>
      <i class="fas fa-map-marked-alt"></i>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
