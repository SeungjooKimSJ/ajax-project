<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJAX Project</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <header>
    <h1 class="header-h1">Bucket Places</h1>
    <div class="header-search-icon">
      <i class="fas fa-search"></i>
    </div>
  </header>

  <main>
    <div class="main-h2-and-img">
      <h2 class="greeting">Welcome, SJ !</h2>
      <img src="images/new-year-winter-ver.jpg" alt="2021 with santa hat" class="main-img">
    </div>
    <div class="main-two-btns">
      <div class="main-first-btn">
        <button>
          <div class="main-btn-search-icon">
            <i class="fas fa-search"></i>
          </div>
          search bucket places
        </button>
      </div>
      <div class="main-second-btn">
        <button>To My Places</button>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-icons">
      <i class="fas fa-home"></i>
      <i class="fas fa-plus"></i>
      <i class="fas fa-map-marked-alt"></i>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
